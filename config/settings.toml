# study-web 全部可调参数（改行为不改代码）
# 密钥不进本文件，放 .env（LLM_API_KEY / LLM_BASE_URL）

total_days = 25
docx_dir = "../docx"
active_workspace = "ragent"
init_max_tokens = 8192
code_line_limit = 20
code_line_exemption_days = [21]
mastery_pass_score = 3.0
force_skip_score = 2.0
round_review_interval = [5, 6]
status_enum = ["not_started", "in_progress", "completed", "postponed"]
review_min_questions = 8
study_review_min_chars = 3000
chat_history_max_turns = 20
ai_read_max_per_reply = 3   # AI 读文件 tool-use：单条回复最多 READ 次数
ai_read_max_lines = 200     # 单次注入给 AI 的最大行数
review_intervals = [1, 3, 7]  # 间隔复习到期窗口（距来源天的天数）
review_max_items = 6          # 单日复习项上限（回滚 > 卡壳 > 疑问）
init_detail_days = 3          # 初始化时细化前 N 天，其余粗纲滚动细化
verify_timeout = 300          # [验证代码] 构建/测试超时秒数
verify_offline = false        # true 时 maven 加 -o 禁网络（需依赖已缓存）
materials_prefetch_max_chars = 6000   # 备课预取注入总量上限（字符）
materials_catalog_max_lines = 60      # 注入 system 的资料清单行数上限
materials_cache_max_chars = 500000    # 单资料解析缓存字符上限

[llm]
provider = "openai_compat"
fallback_provider = "deepseek_official"
warmup_on_start = true
[llm.openai_compat]
model = "deepseek-v4-pro"
max_tokens = 4096
temperature = 0.7
base_url = "https://opencode.ai/zen/go/v1"
api_key_env = "LLM_API_KEY"
[llm.deepseek_official]
model = "deepseek-chat"
max_tokens = 4096
temperature = 0.7
base_url = "https://api.deepseek.com/v1"
api_key_env = "LLM_API_KEY_DEEPSEEK"
[[stages]]
name = "teaching"
next = "coding"
sop_step = "步骤一：文档带读"
instruction = "提炼当天文档/知识的核心要点进行带读讲解，单次回复正文控制在 1000 字以内，杜绝超前引入未学过的概念。"

[[stages]]
name = "coding"
next = "source_review"
sop_step = "步骤二：Replica 交互式编码"
instruction = "在 ragent-replica 下提供 Demo 骨架和关键逻辑占位（如 // TODO 填空），引导用户手写关键行并跑通调试。禁止直接给出完整可复制实现，单次连续代码不超过配置的行数上限。"

[[stages]]
name = "source_review"
next = "paper"
sop_step = "步骤三：源码深度对照"
instruction = "用户跑通 Demo 后，引导阅读 ragent原项目 源码，按 Why（架构权衡）/ Where（类名方法名定位）/ QA（面试三连问）三要素深度讲解。"

[[stages]]
name = "paper"
next = "quiz_r1"
sop_step = "步骤四：前沿论文/文章带读"
instruction = "带读当日推荐论文的核心章节，阐明其在业界方案设计、算法演进和面试加分中的作用。"

[[stages]]
name = "quiz_r1"
next = "quiz_r2"
sop_step = "步骤五-1：第一轮追问"
instruction = "发起第一轮检验提问，考点为基础概念/参数意义（What/How）。只出一道题，出题后停止，等待用户回答。用户提交答案后先专业点评、纠正偏差、给出面试口径，然后立即进入第二轮。"

[[stages]]
name = "quiz_r2"
next = "scored"
sop_step = "步骤五-2：第二轮追问"
instruction = "发起第二轮深度追问，必须触及底层原理（数学逻辑、源码类与方法定位、业务决策 Why/Where）。只出一道题，出题后停止。用户提交答案后点评并给出终期量化评分，评分必须以【评分：X.X】标记输出（1.0-5.0）。"

[[stages]]
name = "scored"
next = "completed"
sop_step = "终期评分与推进征求"
instruction = "根据评分输出跳转预告（及格）或拒绝推进（不及格），等待用户确认。"

[[stages]]
name = "completed"
next = ""
sop_step = "单元完成"
instruction = "单元已完成，输出下一单元开场或当日总结。"

# ---------- 触发指令注册表 ----------
# handler = "declarative" 走通用解释器；其余为 commands/ 下代码 handler 名
[commands."开始今日学习"]
handler = "start_day"
sop_card = "SOP_开始今日学习.md"

[commands."恢复学习"]
handler = "resume"
sop_card = "SOP_恢复学习.md"

[commands."下一内容"]
handler = "next_content"
sop_card = "SOP_下一内容.md"

[commands."强制下一内容"]
handler = "next_content"
sop_card = "SOP_下一内容.md"
mode = "force"

[commands."超前学习"]
handler = "next_content"
sop_card = "SOP_下一内容.md"
mode = "ahead"

[commands."同步"]
handler = "sync"
sop_card = "SOP_同步.md"

[commands."开始写代码"]
handler = "code_mode"
sop_card = "SOP_开始写代码.md"

[commands."验证代码"]
handler = "verify_code"
sop_card = ""

[commands."开始今日复盘"]
handler = "day_review"
sop_card = "SOP_开始今日复盘.md"

[commands."结束今日学习"]
handler = "end_day"
sop_card = "SOP_结束今日学习.md"

[commands."跳转天数"]
handler = "jump_day"
sop_card = "SOP_跳转天数.md"

